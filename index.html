                <li><a href="#" data-section="portfolio">Portfolio</a></li>

            <div class="profile-img">
                <img src="images\WhatsApp Image 2024-09-01 at 8.55.04 PM.jpeg" alt="Profile Picture">
            </div>
            <div class="text">
                <h1>Hello, I'm Lakshwin </h1>
                <p class="typing">I am a Web Developer.</p>
                <div class="social-links">
                    <a href="https://instagram.com/yourusername" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>

            <input type="text" id="name" name="name" required>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    </footer>
